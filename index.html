<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dot Dodger - Leaderboard</title>
    <style>
        body { background: #111; color: white; text-align: center; font-family: sans-serif; }
        canvas { background: #000; display: block; margin: 20px auto; border: 2px solid #333; }
        #ui { margin-top: 10px; }
    </style>
</head>
<body>
    <h1>Dot Dodger</h1>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div id="ui">
        <p>Skor: <span id="score">0</span></p>
        <button onclick="startGame()">Mulai Game</button>
    </div>
    <h2>Leaderboard</h2>
    <ol id="leaderboard"></ol>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        let score = 0, gameActive = false, player = {x: 190, y: 350}, enemies = [];

        function startGame() {
            score = 0; enemies = []; gameActive = true;
            requestAnimationFrame(update);
        }

        function update() {
            if (!gameActive) return;
            score++;
            document.getElementById("score").innerText = Math.floor(score/10);
            
            // Logika Musuh
            if (Math.random() < 0.05) enemies.push({x: Math.random()*380, y: 0});
            enemies.forEach(e => { e.y += 5; });

            // Deteksi Tabrakan
            enemies.forEach(e => {
                if (e.y > 350 && Math.abs(e.x - player.x) < 30) gameOver();
            });

            // Draw
            ctx.clearRect(0,0,400,400);
            ctx.fillStyle = "blue"; ctx.fillRect(player.x, player.y, 30, 30);
            ctx.fillStyle = "red";
            enemies.forEach(e => ctx.fillRect(e.x, e.y, 20, 20));
            
            requestAnimationFrame(update);
        }

        function gameOver() {
            gameActive = false;
            let finalScore = Math.floor(score/10);
            let lb = JSON.parse(localStorage.getItem("lb")) || [];
            lb.push(finalScore);
            lb.sort((a,b) => b-a);
            localStorage.setItem("lb", JSON.stringify(lb.slice(0, 5)));
            showLeaderboard();
            alert("Game Over! Skor kamu: " + finalScore);
        }

        function showLeaderboard() {
            const list = document.getElementById("leaderboard");
            list.innerHTML = "";
            let lb = JSON.parse(localStorage.getItem("lb")) || [];
            lb.forEach(s => list.innerHTML += `<li>${s}</li>`);
        }

        window.onmousemove = (e) => { player.x = e.clientX - canvas.offsetLeft - 15; };
        showLeaderboard();
    </script>
</body>
</html>
